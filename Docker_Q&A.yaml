10. What is a multi-stage build, and how can it be used to reduce the size of a container image?
A: A multi-stage build in Docker allows you to use multiple FROM statements in a single Dockerfile. Each FROM starts a new build stage, and you can copy only the necessary
   artifacts from earlier stages into the final image.
   The main goal is to separate the build environment from the runtime environment, so the final container image contains only what is required to run the application.

   Example: Multi-Stage Dockerfile:

FROM node:19-alpine AS firststage
WORKDIR /app
COPY package*.json ./
RUN npm install
COPY . .
EXPOSE 3000

FROM firststage AS final
RUN npm install --production # --production will ignore cache
COPY . .
CMD ["node", "index.js"]
------
Example with a Go application:
   
# Stage 1: Build the Go application
FROM golang:1.16 AS builder
WORKDIR /app
COPY main.go .
RUN go build main.go

# Stage 2: Create a minimal image with the built binary
FROM alpine:latest  # MINIMAL BASE IMAGE
WORKDIR /root/
COPY --from=builder /app/main . # COPY WHAT WE WANT!
CMD ["./main"]

================================================================================

