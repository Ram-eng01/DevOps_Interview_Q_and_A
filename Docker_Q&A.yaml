What Happens When You Run docker run nginx
A: 1) Docker client sends the command to Docker daemon
   2) Daemon checks if nginx image exists locally
   3) If not found — pulls it from Docker Hub
   4) Creates a new container from the image
   5) Allocates a filesystem, network interface, and IP
   6) Starts the container process
   7) Container runs until the process exits (or you stop it)
   
3. What is the difference between Docker image and Docker container?
A:  
     Docker Image:
        Docker image is a read-only template with intruction for creating a Docker container
        $docker build -t nginx:v1 .
       
     Docker Container:
        A running instance of an image
       A container is a lightweight, standalone, and executable software package that includes everything your application needs to run —code, 
       runtime, libraries, and dependencies. Containers ensure that your application works consistently across various environments, from development to production.

      $docker run -itd --name myfirst-container -p 1234:80 nginx:v1

    
4. What is Dockerfile?
A: A Dockerfile is a plain text file named Dockerfile (no extension) that contains a set of instructions to build a Docker image layer by layer.

Dockerfile
    |
    | docker build -t myapp .
    v
Docker Image  (stack of read-only layers)
    |
    | docker run myapp
    v
Container  (image layers + writable layer on top)

----------------
Image Layers
---------------
Every instruction in a Dockerfile creates a new layer:

Layer 5: CMD ["node", "server.js"]         <-- writable at run time
Layer 4: COPY . .
Layer 3: RUN npm install
Layer 2: COPY package.json .
Layer 1: FROM node:20-alpine               <-- base layer

Layers are cached — if nothing changes, Docker reuses cached layers, making rebuilds fast.

5. Explain Dockerfile Components?
A: Dockerfile Instructions Reference
Instruction	    Syntax	      Purpose
-----------------
FROM	          FROM image:tag	         Base image to build from (must be first)
WORKDIR	       WORKDIR /app	            Set working directory for subsequent instructions
COPY	          COPY src dest	            Copy files from host machine to container
ADD	          ADD src dest	            Like COPY but also extracts tarballs and fetches URLs
RUN	          RUN command	            Execute a command at build time
CMD	          CMD ["exec", "arg"]	      Default command to run when container starts (overridable)
ENTRYPOINT    	ENTRYPOINT ["exec"]	      Fixed command; CMD provides default arguments
ENV	          ENV KEY=value	            Set environment variables (available at build and run time)
ARG	          ARG NAME=default	         Build-time variables (not available at run time)
EXPOSE	       EXPOSE 8080	            Document which port the app listens on
VOLUME	       VOLUME ["/data"]	         Declare a mount point for persistent data
USER	          USER appuser	            Switch to a non-root user
LABEL	          LABEL key=value	         Add metadata to the image
HEALTHCHECK	    HEALTHCHECK CMD ...	      Define a health check command
SHELL	          SHELL ["/bin/sh"]	      Change the default shell for RUN instructions

       
6. What is the difference between COPY and ADD?
A: COPY: Simply copies files and directories from the host to the container
   ADD: More powerful. Can copy files and directories and also supports URL downloads and automatic extraction of compressed files.

   
7. What is the difference between CMD and ENTRYPOINT?
A:
Both are used to start the application in the container when the container starts.
CMD:
  - CMD Defines default command and/or arguments to run inside the container. 
  - Can be overridden at runtime by providing a new command.
ENTRYPOINT:
  - Defines a fixed command that always runs.
  - Arguments can be passed at runtime, but the command remains the same.
============================================================================+
# CMD only — fully overridable
CMD ["node", "server.js"]
# docker run myapp            -> runs: node server.js
# docker run myapp python app -> runs: python app   (CMD replaced)

# ENTRYPOINT only
ENTRYPOINT ["node"]
# docker run myapp            -> runs: node
# docker run myapp server.js  -> runs: node server.js

# ENTRYPOINT + CMD (best practice)
ENTRYPOINT ["node"]
CMD ["server.js"]
# docker run myapp            -> runs: node server.js  (default)
# docker run myapp app.js     -> runs: node app.js     (CMD overridden)
================================================================================

8. what is dangling images?
A: when we build the new image with same name and tag as previous image. The previous image will go None state. It is called dangling image.
    $docker image prune    # Remove dangling images
    $docker image prune -a  # Remove all unused images


9. Write a Dockerfile.
A:  
Example 1: Simple Node.js App
project/
├── Dockerfile
├── package.json
├── package-lock.json
└── src/
    └── index.js

FROM node:20-alpine                        # Step 1: Choose a base image
WORKDIR /app                               # Step 2: Set working directory inside the container
COPY package*.json ./                      # Step 3: Copy dependency files first (for layer caching)
RUN npm install                            # Step 4: Install dependencies
COPY . .                                   # Step 5: Copy the rest of the source code
EXPOSE 3000                                # Step 6: Expose the port the app runs on
CMD ["node","src/index.js"]                # Step 7: Define the command to start the app

Build and run:
  $docker build -t my-node-app:1.0 .
  $docker run -itd -p 3000:3000 --name nodeapp my-node-app:1.0
  $docker exec -it <cont-id> bash
=========================================================================
Example 2: Python Flask App

FROM python:3.12-slim
WORKDIR /app
COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt
COPY . .
EXPOSE 5000
CMD ["python", "app.py"]

=========================================================================
10. What is a multi-stage build, and how can it be used to reduce the size of a container image?
A: A multi-stage build in Docker allows you to use multiple FROM statements in a single Dockerfile. Each FROM starts a new build stage, and you can copy only the necessary
   artifacts from earlier stages into the final image.
   The main goal is to separate the build environment from the runtime environment, so the final container image contains only what is required to run the application.

   Example: Multi-Stage Dockerfile:

FROM node:19-alpine AS firststage
WORKDIR /app
COPY package*.json ./
RUN npm install
COPY . .
EXPOSE 3000

FROM firststage AS final
RUN npm install --production # --production will ignore cache
COPY . .
CMD ["node", "index.js"]

================================================================================

11.How do you reduce Docker image size?
A: 1. multistage Dockerfile
   2. Combine RUN commands to reduce layers
   3. Use .dockerignore

