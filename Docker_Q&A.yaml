19. What is Docker Compose?
A: Docker Compose is a tool used to define and run multi-container applications. Instead of managing individual docker run commands,
   you can use a docker-compose.yml file to configure and start your entire application stack with a single command.

   
----------------------
Docker Compose: used to create multiple serviceson a single host at a time
Docker Swarm: Used to create single service on a multiple hosts at a time
Docker STACK: Used to create multiple services on multiple hosts at a time
----------------------

20. What is Docker Swarm?
A: Docker Swarm is a native clustering and orchestration tool for Docker containers. It enables you to manage a group of Docker nodes as a single virtual system, simplifying container deployments and scaling. 

